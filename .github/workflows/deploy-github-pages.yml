# Builds the Vite app and publishes ONLY dist/ to branch "gh-pages".
#
# After the first successful run, set the site source in the repo:
#   Settings → Pages → Build and deployment → Source: Deploy from a branch
#   Branch: gh-pages  /  Folder: / (root)
#
# Do NOT use "main" + "/" as the Pages source — that serves raw index.html
# (with /src/main.tsx) and causes a white screen.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - name: Build for GitHub Pages (subfolder /rentadria/)
        env:
          VITE_BASE_PATH: /rentadria
        run: npm run build

      # SPA: direct URLs to /terms etc. need 404.html = index.html on GitHub Pages
      - run: cp dist/index.html dist/404.html

      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
